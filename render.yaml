services:
  - type: web
    name: seat-booking-backend
    runtime: java
    runtimeVersion: 21
    buildCommand: cd backend && mvn clean package
    startCommand: java -jar backend/target/demo-0.0.1-SNAPSHOT.jar
    envVars:
      - key: SPRING_DATASOURCE_URL
        scope: run
      - key: SPRING_DATASOURCE_USERNAME
        scope: run
      - key: SPRING_DATASOURCE_PASSWORD
        scope: run
      - key: APP_JWT_SECRET
        scope: run
      - key: APP_JWT_EXPIRATION_MS
        value: "86400000"
      - key: PORT
        value: "10000"
